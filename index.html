<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぽんず（本物）のおやつ代ゲーム</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2A9B8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFF8F0; --white:#FFFFFF;
  --pink:#F2A9B8; --pink-soft:#FBE3E8; --pink-deep:#E58CA0;
  --brown:#6B5847; --brown-light:#A08D7B;
  --grass1:#EAF3DE; --grass2:#DCEBCC;
  --gold:#F5C878; --shadow:rgba(107,88,71,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Zen Maru Gothic',system-ui,sans-serif;
  background:var(--cream); color:var(--brown);
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
  display:flex;justify-content:center;
}
#app{width:100%;max-width:520px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}

/* ===== ヘッダー ===== */
header{
  padding:calc(env(safe-area-inset-top) + 10px) 16px 8px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
header h1{font-size:13px;font-weight:700;color:var(--brown-light);line-height:1.3;}
#ptWrap{
  background:var(--white);border-radius:999px;padding:6px 16px;
  box-shadow:0 2px 8px var(--shadow);display:flex;align-items:baseline;gap:6px;
  border:2px solid var(--pink-soft);
}
#ptWrap .label{font-size:10px;color:var(--brown-light);font-weight:700;}
#pts{font-size:20px;font-weight:700;color:var(--pink-deep);font-variant-numeric:tabular-nums;}
#ptWrap .unit{font-size:12px;color:var(--pink-deep);font-weight:700;}

/* ===== 庭 ===== */
#garden{
  flex:1;position:relative;margin:4px 12px 8px;border-radius:24px;
  background:linear-gradient(180deg,var(--grass1),var(--grass2));
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.6), 0 4px 14px var(--shadow);
  overflow:hidden;
}
.gobj{position:absolute;transform:translate(-50%,-50%);pointer-events:none;}
.toy{font-size:26px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.12));animation:toyPop .3s ease-out;}
@keyframes toyPop{from{transform:translate(-50%,-50%) scale(0);}to{transform:translate(-50%,-50%) scale(1);}}
#toybox{font-size:44px;z-index:3;}
#toybox .ribbon{position:absolute;top:-10px;right:-6px;font-size:20px;display:none;}
#toybox.up1 .ribbon{display:block;}
#toybox.up2{font-size:54px;}
#matEl{font-size:38px;display:none;opacity:.95;}
#doghouseEl{font-size:52px;display:none;}
#benchEl{font-size:40px;display:none;letter-spacing:-6px;}
.flower{font-size:22px;display:none;animation:sway 3.2s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:translate(-50%,-50%) rotate(-6deg);}50%{transform:translate(-50%,-50%) rotate(6deg);}}
#scentEl{
  font-size:15px;background:var(--white);border:2px solid var(--pink);border-radius:999px;
  padding:5px 12px;font-weight:700;color:var(--pink-deep);
  box-shadow:0 3px 8px var(--shadow);pointer-events:auto;cursor:pointer;
  animation:pulse 1.1s ease-in-out infinite;display:none;z-index:6;white-space:nowrap;
}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.12);}}
#bigItemEl{font-size:44px;z-index:4;animation:toyPop .3s ease-out;}
#wagonEl{display:none;z-index:4;}
#wagonEl svg{filter:drop-shadow(0 2px 2px rgba(0,0,0,.15));}
#ballEl{font-size:24px;z-index:5;display:none;}

/* ===== ぽんず ===== */
#dog{position:absolute;z-index:10;transform:translate(-50%,-72%);pointer-events:auto;cursor:pointer;width:86px;height:72px;}
#dog .flip{width:100%;height:100%;}
#dog.faceLeft .flip{transform:scaleX(-1);}
#dogSvg{animation:bob 1.4s ease-in-out infinite;transform-origin:50% 90%;}
#dog.moving #dogSvg{animation:bob .55s ease-in-out infinite;}
#dog.dashing #dogSvg{animation:bob .3s ease-in-out infinite;}
#dog.sniffing #dogSvg{animation:sniff .5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes sniff{0%,100%{transform:rotate(14deg) translateY(5px);}50%{transform:rotate(18deg) translateY(8px);}}
#carryEmoji{
  position:absolute;font-size:22px;z-index:11;right:-6px;top:26px;display:none;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.12));
}
#dog.faceLeft #carryEmoji{right:auto;left:-6px;}

/* ===== 浮遊テキスト・パーティクル ===== */
.floatPt{
  position:absolute;transform:translate(-50%,-50%);font-weight:700;font-size:17px;
  color:var(--pink-deep);text-shadow:0 1px 0 #fff;pointer-events:none;z-index:20;
  animation:floatUp 1.1s ease-out forwards;
}
.floatPt.big{font-size:22px;color:#D97706;}
@keyframes floatUp{0%{opacity:0;translate:0 8px;}15%{opacity:1;}100%{opacity:0;translate:0 -46px;}}
.heart{position:absolute;transform:translate(-50%,-50%);font-size:16px;pointer-events:none;z-index:20;animation:heartUp 1s ease-out forwards;}
@keyframes heartUp{0%{opacity:1;translate:0 0;scale:.6;}100%{opacity:0;translate:0 -40px;scale:1.2;}}
.funfun{position:absolute;transform:translate(-50%,-50%);font-size:12px;font-weight:700;color:var(--brown-light);pointer-events:none;z-index:20;animation:floatUp 1s ease-out forwards;}

/* ===== ボトムシート ===== */
#sheet{
  background:var(--white);border-radius:22px 22px 0 0;box-shadow:0 -4px 18px var(--shadow);
  flex-shrink:0;transition:max-height .3s ease;max-height:96px;overflow:hidden;
  padding-bottom:env(safe-area-inset-bottom);
}
#sheet.open{max-height:54dvh;}
#sheetHandle{padding:8px 0 2px;display:flex;justify-content:center;cursor:pointer;}
#sheetHandle::before{content:'';width:44px;height:5px;border-radius:3px;background:var(--pink-soft);}
#tabs{display:flex;gap:6px;padding:6px 14px 10px;}
.tab{
  flex:1;border:none;background:var(--cream);color:var(--brown-light);
  font-family:inherit;font-weight:700;font-size:13px;padding:8px 0;border-radius:12px;cursor:pointer;
}
.tab.active{background:var(--pink-soft);color:var(--pink-deep);}
.panel{display:none;overflow-y:auto;max-height:calc(54dvh - 96px);padding:0 14px 16px;}
.panel.active{display:block;}

/* ショップ */
.shopItem{
  display:flex;align-items:center;gap:10px;background:var(--cream);
  border-radius:14px;padding:10px 12px;margin-bottom:8px;
}
.shopItem .icon{font-size:26px;width:34px;text-align:center;}
.shopItem .info{flex:1;min-width:0;}
.shopItem .name{font-size:13.5px;font-weight:700;}
.shopItem .desc{font-size:11px;color:var(--brown-light);}
.buyBtn{
  border:none;font-family:inherit;font-weight:700;font-size:12.5px;
  background:var(--pink);color:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;
  white-space:nowrap;transition:transform .1s;
}
.buyBtn:active{transform:scale(.94);}
.buyBtn:disabled{background:#E8DFD5;color:#B4A695;cursor:default;}
.shopItem.owned{opacity:.65;}
.shopItem.owned .buyBtn{background:var(--grass2);color:#6E8B5B;}
.shopItem.justBought{animation:bought .5s ease;}
@keyframes bought{0%{transform:scale(1);}30%{transform:scale(1.04);}100%{transform:scale(1);}}

/* きろく */
.statRow{display:flex;justify-content:space-between;padding:9px 4px;border-bottom:1px dashed var(--pink-soft);font-size:13px;}
.statRow b{color:var(--pink-deep);font-variant-numeric:tabular-nums;}

/* おうえん */
#supportPanel p{font-size:12.5px;line-height:1.8;margin-bottom:14px;}
#supportBtn{
  width:100%;border:none;font-family:inherit;font-weight:700;font-size:15px;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;
  border-radius:16px;padding:14px;cursor:pointer;box-shadow:0 4px 10px var(--shadow);
}
#supportBtn:active{transform:scale(.97);}

/* トースト */
#toast{
  position:absolute;bottom:120px;left:50%;transform:translateX(-50%);
  background:rgba(107,88,71,.92);color:#fff;font-size:13px;font-weight:500;
  padding:9px 18px;border-radius:999px;opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:60;white-space:nowrap;
}
#toast.show{opacity:1;}

/* エンディング */
#endingOverlay{
  position:absolute;inset:0;background:rgba(255,248,240,.88);z-index:50;
  display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;
}
#endingOverlay.show{display:flex;}
#endingCard{
  background:var(--white);border-radius:24px;padding:28px 24px;box-shadow:0 8px 30px var(--shadow);
  border:3px solid var(--pink-soft);max-width:320px;animation:toyPop .4s ease-out;
}
#endingCard h2{font-size:20px;color:var(--pink-deep);margin-bottom:12px;}
#endingCard p{font-size:13px;line-height:1.9;margin-bottom:18px;}
#endingClose{
  border:none;font-family:inherit;font-weight:700;background:var(--pink);color:#fff;
  border-radius:999px;padding:10px 28px;font-size:14px;cursor:pointer;
}
.confetti{position:absolute;top:-20px;font-size:18px;z-index:55;pointer-events:none;animation:confFall linear forwards;}
@keyframes confFall{to{transform:translateY(110dvh) rotate(720deg);opacity:.7;}}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>ぽんず（本物）の<br>おやつ代ゲーム</h1>
    <div id="ptWrap"><span class="label">喜び</span><span id="pts">0</span><span class="unit">pt</span></div>
  </header>

  <div id="garden">
    <div class="gobj" id="doghouseEl" style="left:13%;top:13%;">🏠</div>
    <div class="gobj flower" id="flower1" style="left:8%;top:52%;">🌸</div>
    <div class="gobj flower" id="flower2" style="left:16%;top:60%;">🌼</div>
    <div class="gobj flower" id="flower3" style="left:6%;top:70%;">🌷</div>
    <div class="gobj flower" id="flower4" style="left:90%;top:36%;">🌸</div>
    <div class="gobj" id="benchEl" style="left:78%;top:16%;">⛱️🪑</div>
    <div class="gobj" id="matEl" style="left:16%;top:32%;">🧩</div>
    <div class="gobj" id="toybox" style="left:84%;top:80%;">🧺<span class="ribbon">🎀</span></div>
    <div class="gobj" id="scentEl">👃 においがする！</div>
    <div class="gobj" id="bigItemEl" style="display:none;"></div>
    <div class="gobj" id="wagonEl">
      <svg viewBox="0 0 60 34" width="52" height="30">
        <rect x="4" y="4" width="46" height="16" rx="4" fill="#E58CA0" stroke="#C9718A" stroke-width="2"/>
        <circle cx="16" cy="26" r="6" fill="#6B5847"/><circle cx="40" cy="26" r="6" fill="#6B5847"/>
        <circle cx="16" cy="26" r="2.4" fill="#FFF8F0"/><circle cx="40" cy="26" r="2.4" fill="#FFF8F0"/>
      </svg>
    </div>
    <div class="gobj" id="ballEl">🎾</div>

    <div id="dog" style="left:50%;top:58%;">
      <div class="flip">
        <svg id="dogSvg" viewBox="0 0 120 100" width="86" height="72">
          <ellipse cx="50" cy="88" rx="30" ry="6" fill="rgba(107,88,71,.10)"/>
          <circle cx="20" cy="52" r="10" fill="#fff" stroke="#EADFD3" stroke-width="3"/>
          <rect x="32" y="68" width="9" height="16" rx="4.5" fill="#fff" stroke="#EADFD3" stroke-width="2.5"/>
          <rect x="62" y="68" width="9" height="16" rx="4.5" fill="#fff" stroke="#EADFD3" stroke-width="2.5"/>
          <ellipse cx="52" cy="60" rx="34" ry="25" fill="#fff" stroke="#EADFD3" stroke-width="3"/>
          <circle cx="79" cy="24" r="11" fill="#F6E9DC" stroke="#EADFD3" stroke-width="2.5"/>
          <circle cx="105" cy="24" r="11" fill="#F6E9DC" stroke="#EADFD3" stroke-width="2.5"/>
          <circle cx="92" cy="38" r="23" fill="#fff" stroke="#EADFD3" stroke-width="3"/>
          <circle cx="86" cy="35" r="3" fill="#4A3B32"/>
          <circle cx="101" cy="35" r="3" fill="#4A3B32"/>
          <circle cx="87" cy="34" r="1" fill="#fff"/>
          <circle cx="102" cy="34" r="1" fill="#fff"/>
          <ellipse cx="94" cy="45" rx="4.5" ry="3.6" fill="#4A3B32"/>
          <path d="M94 48 Q94 53 89 53 M94 48 Q94 53 99 53" stroke="#4A3B32" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <circle cx="80" cy="45" r="4" fill="#FBD5DC" opacity=".8"/>
          <circle cx="106" cy="45" r="4" fill="#FBD5DC" opacity=".8"/>
        </svg>
      </div>
      <div id="carryEmoji"></div>
    </div>

    <div id="endingOverlay">
      <div id="endingCard">
        <h2>🎉 ぽんずの庭、かんせい！</h2>
        <p>ぜんぶのパーツがそろいました。<br>ぽんずはこれからも、この庭で<br>おもちゃを集めて遊びます。<br>いつも見てくれてありがとう🐾</p>
        <button id="endingClose">これからも遊ぶ</button>
      </div>
    </div>
    <div id="toast"></div>
  </div>

  <div id="sheet">
    <div id="sheetHandle"></div>
    <div id="tabs">
      <button class="tab active" data-panel="shopPanel">🛍️ ショップ</button>
      <button class="tab" data-panel="statsPanel">📖 きろく</button>
      <button class="tab" data-panel="supportPanel">🦴 おうえん</button>
    </div>
    <div class="panel active" id="shopPanel"></div>
    <div class="panel" id="statsPanel"></div>
    <div class="panel" id="supportPanel">
      <p>このゲームの「おうえん」は、<b>本物のぽんず</b>へのおやつ代になります。ゲーム内の課金アイテムは一切ありません。おうえんはすべて、実在するふわふわの犬のおやつに変わります🐶</p>
      <button id="supportBtn">🦴 ぽんずにおやつを贈る</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* =====================================================
   CONFIG — 数値調整はすべてここ
   ===================================================== */
const SUPPORT_LINK_URL = ''; // 課金導線URL（Amazonほしい物リスト等）。空の間は「準備中」トースト

const CONFIG = {
  SAVE_KEY: 'ponzu_oyatsu_v2',
  BASE_TOY_POINTS: 10,     // 通常おもちゃ（🎾）納品pt
  RARE_TOY_POINTS: 25,     // 高価値おもちゃ（🪢🧸）納品pt
  BALL_BONUS: 15,          // ボール投げ回収の追加ボーナス
  PET_POINTS: 2,           // なでる1回のpt
  PET_LIMIT: 6,            // この回数/10秒 を超えるとptは出ない（ハートは出る）
  PET_WINDOW_MS: 10000,
  NOSEWORK_POINTS: 60,     // ノーズワーク成功pt
  NOSEWORK_TIME_MS: 3500,  // ふんふんする時間
  NOSEWORK_MIN_MS: 45000, NOSEWORK_MAX_MS: 90000, // においの出現間隔
  BIGITEM_POINTS: 80,      // 大きいもの運びpt
  BIGITEM_MIN_MS: 60000, BIGITEM_MAX_MS: 120000,  // 大きいものの出現間隔
  SPAWN_INTERVAL_MS: 4500, // おもちゃのスポーン間隔
  MAX_TOYS_BASE: 3, MAX_TOYS_EXTRA: 2,   // 同時おもちゃ数（＋ボールの追加）
  RARE_CHANCE: 0.35,       // ロープ＆ぬいぐるみ購入後の高価値おもちゃ率
  DOG_SPEED: 13,           // 移動速度（庭単位/秒）
  DOG_SPEED_POUCH: 20,     // おやつポーチ購入後
  DASH_MULT: 1.8,          // ボール追いかけ時の倍率
  HAUL_MULT: 0.55,         // ワゴン運搬時の倍率
  THROW_COOLDOWN_MS: 6000, // ボール投げのクールダウン
  TOYBOX1_BONUS: 5, TOYBOX2_BONUS: 10,   // 納品ボーナス
  DECOR_MULT: 0.1,         // 装飾1つあたりのpt倍率加算
  OFFLINE_PT_PER_MIN: 6, OFFLINE_CAP_PT: 1500, // ドッグハウスのおるすばん収入
  SHOP: [
    { id:'toybox1',  emoji:'🎀', name:'おもちゃ箱の補強',   desc:'納品ボーナス +5pt',                    price:200 },
    { id:'balls',    emoji:'🎾', name:'ボールの追加',       desc:'散らばるおもちゃが +2個',               price:350 },
    { id:'rope',     emoji:'🪢', name:'ロープ＆ぬいぐるみ', desc:'高価値おもちゃ（25pt）が出るように',     price:550 },
    { id:'pouch',    emoji:'👝', name:'おやつポーチ',       desc:'ぽんずの走る速さアップ',                price:800 },
    { id:'toybox2',  emoji:'🧺', name:'おおきなおもちゃ箱', desc:'納品ボーナス さらに +10pt',             price:1200 },
    { id:'mat',      emoji:'🧩', name:'ノーズワークマット', desc:'「におい」を探すと 60pt',               price:1500 },
    { id:'wagon',    emoji:'🛷', name:'ワゴン',             desc:'大きいもの運び（80pt）が出るように',     price:2200 },
    { id:'flowers',  emoji:'🌸', name:'お花畑',             desc:'庭に花が咲く・獲得pt ×1.1',             price:3000 },
    { id:'bench',    emoji:'⛱️', name:'ベンチとパラソル',   desc:'庭がにぎやかに・獲得pt さらに ×1.1',    price:4000 },
    { id:'doghouse', emoji:'🏠', name:'ドッグハウス',       desc:'閉じている間もゆっくり貯まる',           price:5500 },
  ],
};

/* ===== 固定座標（庭単位 0-100） ===== */
const POS = {
  BOX: { x:84, y:80 },
  MAT: { x:16, y:32 },
};

/* ===== 状態 ===== */
let state = {
  points: 0,
  owned: {},
  stats: { delivered:0, thrown:0, pets:0, nose:0, hauls:0, earned:0 },
  started: Date.now(),
  lastSeen: Date.now(),
  endingSeen: false,
};

function save(){
  state.lastSeen = Date.now();
  try{ localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(state)); }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem(CONFIG.SAVE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    state.points = d.points|0;
    state.owned = d.owned || {};
    state.stats = Object.assign(state.stats, d.stats||{});
    state.started = d.started || Date.now();
    state.lastSeen = d.lastSeen || Date.now();
    state.endingSeen = !!d.endingSeen;
  }catch(e){}
}

/* ===== 派生値 ===== */
const own = id => !!state.owned[id];
const multiplier = () => 1 + (own('flowers')?CONFIG.DECOR_MULT:0) + (own('bench')?CONFIG.DECOR_MULT:0);
const deliveryBonus = () => (own('toybox1')?CONFIG.TOYBOX1_BONUS:0) + (own('toybox2')?CONFIG.TOYBOX2_BONUS:0);
const maxToys = () => CONFIG.MAX_TOYS_BASE + (own('balls')?CONFIG.MAX_TOYS_EXTRA:0);
const dogSpeed = () => own('pouch') ? CONFIG.DOG_SPEED_POUCH : CONFIG.DOG_SPEED;

/* ===== DOMショートカット ===== */
const $ = id => document.getElementById(id);
const garden = $('garden'), dogEl = $('dog'), ptsEl = $('pts');

/* ===== 獲得・演出 ===== */
function fmt(n){ return Math.floor(n).toLocaleString('ja-JP'); }
function updateHUD(){ ptsEl.textContent = fmt(state.points); }

function earn(base, x, y, big){
  const amt = Math.round(base * multiplier());
  state.points += amt;
  state.stats.earned += amt;
  floatText('+'+amt, x, y, big);
  updateHUD();
  renderShopStates();
}
function floatText(text, x, y, big){
  const el = document.createElement('div');
  el.className = 'floatPt' + (big?' big':'');
  el.textContent = text;
  el.style.left = x+'%'; el.style.top = y+'%';
  garden.appendChild(el);
  setTimeout(()=>el.remove(), 1100);
}
function particle(cls, text, x, y, jitter){
  const el = document.createElement('div');
  el.className = cls; el.textContent = text;
  el.style.left = (x + (Math.random()*2-1)*(jitter||4)) + '%';
  el.style.top  = (y + (Math.random()*2-1)*(jitter||4)) + '%';
  garden.appendChild(el);
  setTimeout(()=>el.remove(), 1100);
}

let toastTimer = null;
function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}
/* =====================================================
   エンティティ
   ===================================================== */
let toys = [];            // {x,y,pts,emoji,el}
let thrownBall = null;    // {sx,sy,tx,ty,t,landed}
let bigItem = null;       // {x,y,emoji,attached}
let scentActive = false;
let noseQueued = false;
let nextSpawnAt = 0, nextScentAt = Infinity, nextBigAt = Infinity;
let throwReadyAt = 0;
let petTimes = [];

const rand = (a,b)=> a + Math.random()*(b-a);
const dist = (x1,y1,x2,y2)=> Math.hypot(x2-x1, y2-y1);

function randomSpot(){
  // おもちゃ箱まわりを避けた散らばり位置
  for(let i=0;i<20;i++){
    const x = rand(8,76), y = rand(16,84);
    if(dist(x,y,POS.BOX.x,POS.BOX.y) > 16) return {x,y};
  }
  return {x:40,y:50};
}

function spawnToy(){
  if(toys.length >= maxToys()) return;
  const spot = randomSpot();
  const rare = own('rope') && Math.random() < CONFIG.RARE_CHANCE;
  const emoji = rare ? (Math.random()<.5?'🪢':'🧸') : '🎾';
  const el = document.createElement('div');
  el.className = 'gobj toy';
  el.textContent = emoji;
  el.style.left = spot.x+'%'; el.style.top = spot.y+'%';
  garden.appendChild(el);
  toys.push({ x:spot.x, y:spot.y, pts: rare?CONFIG.RARE_TOY_POINTS:CONFIG.BASE_TOY_POINTS, emoji, el });
}

function spawnScent(){
  const p = { x: POS.MAT.x + rand(-4,10), y: POS.MAT.y + rand(8,16) };
  const el = $('scentEl');
  el.style.left = p.x+'%'; el.style.top = p.y+'%';
  el.style.display = 'block';
  scentActive = true;
}
function clearScent(){ $('scentEl').style.display='none'; scentActive=false; }

function spawnBigItem(){
  const spot = randomSpot();
  const emoji = Math.random()<.5 ? '🪵' : '🧸';
  const el = $('bigItemEl');
  el.textContent = emoji;
  el.style.left = spot.x+'%'; el.style.top = spot.y+'%';
  el.style.display = 'block';
  el.style.fontSize = '44px';
  bigItem = { x:spot.x, y:spot.y, emoji, attached:false };
}
function clearBigItem(){ $('bigItemEl').style.display='none'; $('wagonEl').style.display='none'; bigItem=null; }

/* =====================================================
   ぽんず AI
   状態: idle / wander / chase / fetch / carry / haul_go / haul_carry / nose_go / nose_sniff
   ===================================================== */
const dog = { x:50, y:58, state:'idle', tx:50, ty:58, carry:null, sniffT:0, idleWait:1 };

function setCarry(emoji){
  dog.carry = emoji ? { emoji } : null;
  const ce = $('carryEmoji');
  if(emoji){ ce.textContent = emoji; ce.style.display='block'; }
  else ce.style.display='none';
}

function nearestToy(){
  let best=null, bd=1e9;
  for(const t of toys){ const d=dist(dog.x,dog.y,t.x,t.y); if(d<bd){bd=d;best=t;} }
  return best;
}

function think(){
  // 投げたボールは最優先: おもちゃ追跡中でも切り替えてダッシュ
  if(thrownBall && thrownBall.landed && (dog.state==='chase'||dog.state==='wander'||dog.state==='idle')){
    dog.state='fetch'; dog.tx=thrownBall.tx; dog.ty=thrownBall.ty; return;
  }
  // 空いているときの優先順位: におい(タップ済み) > 大きいもの > おもちゃ > うろうろ
  if(dog.state!=='idle' && dog.state!=='wander') return;
  if(thrownBall && thrownBall.landed){
    dog.state='fetch'; dog.tx=thrownBall.tx; dog.ty=thrownBall.ty; return;
  }
  if(noseQueued && scentActive){
    dog.state='nose_go'; dog.tx=POS.MAT.x; dog.ty=POS.MAT.y; return;
  }
  if(bigItem && !bigItem.attached && own('wagon')){
    dog.state='haul_go'; dog.tx=bigItem.x; dog.ty=bigItem.y; return;
  }
  const t = nearestToy();
  if(t){ dog.state='chase'; dog.tx=t.x; dog.ty=t.y; dog.targetToy=t; return; }
  if(dog.state==='idle'){
    dog.idleWait -= 0.016;
    if(dog.idleWait<=0){
      const s=randomSpot(); dog.state='wander'; dog.tx=s.x; dog.ty=s.y;
    }
  }
}

function arrive(){
  switch(dog.state){
    case 'wander':
      dog.state='idle'; dog.idleWait=rand(1,3); break;
    case 'chase': {
      const t = dog.targetToy;
      if(t && toys.includes(t)){
        toys.splice(toys.indexOf(t),1); t.el.remove();
        dog.pendingPts = t.pts; dog.pendingBall = false;
        setCarry(t.emoji);
        dog.state='carry'; dog.tx=POS.BOX.x; dog.ty=POS.BOX.y;
      } else { dog.state='idle'; dog.idleWait=0.3; }
      break;
    }
    case 'fetch':
      if(thrownBall){
        $('ballEl').style.display='none';
        thrownBall=null;
        dog.pendingPts = CONFIG.BASE_TOY_POINTS + CONFIG.BALL_BONUS;
        dog.pendingBall = true;
        setCarry('🎾');
        dog.state='carry'; dog.tx=POS.BOX.x; dog.ty=POS.BOX.y;
      } else { dog.state='idle'; dog.idleWait=0.3; }
      break;
    case 'carry':
      earn(dog.pendingPts + deliveryBonus(), POS.BOX.x, POS.BOX.y - 8, dog.pendingBall);
      state.stats.delivered++;
      setCarry(null);
      dog.state='idle'; dog.idleWait=rand(0.2,0.8);
      break;
    case 'haul_go':
      if(bigItem){
        bigItem.attached=true;
        $('wagonEl').style.display='block';
        dog.state='haul_carry'; dog.tx=POS.BOX.x; dog.ty=POS.BOX.y;
      } else { dog.state='idle'; dog.idleWait=0.3; }
      break;
    case 'haul_carry':
      earn(CONFIG.BIGITEM_POINTS + deliveryBonus(), POS.BOX.x, POS.BOX.y - 8, true);
      state.stats.hauls++; state.stats.delivered++;
      clearBigItem();
      dog.state='idle'; dog.idleWait=rand(0.3,1);
      break;
    case 'nose_go':
      dog.state='nose_sniff'; dog.sniffT = CONFIG.NOSEWORK_TIME_MS/1000;
      break;
  }
}

/* ===== メインループ ===== */
let lastT = performance.now();
function loop(now){
  const dt = Math.min((now-lastT)/1000, 0.1);
  lastT = now;

  // スポーン
  if(now >= nextSpawnAt){
    spawnToy();
    nextSpawnAt = now + CONFIG.SPAWN_INTERVAL_MS;
  }
  if(own('mat') && !scentActive && now >= nextScentAt){ spawnScent(); }
  if(own('wagon') && !bigItem && now >= nextBigAt){
    spawnBigItem();
    nextBigAt = now + rand(CONFIG.BIGITEM_MIN_MS, CONFIG.BIGITEM_MAX_MS);
  }

  // ボールの飛行
  if(thrownBall && !thrownBall.landed){
    thrownBall.t += dt/0.7;
    const b = thrownBall, t = Math.min(b.t,1);
    const x = b.sx + (b.tx-b.sx)*t;
    const y = b.sy + (b.ty-b.sy)*t - Math.sin(Math.PI*t)*18;
    const el = $('ballEl');
    el.style.left=x+'%'; el.style.top=y+'%';
    if(b.t>=1){ b.landed=true; el.style.left=b.tx+'%'; el.style.top=b.ty+'%'; }
  }

  // ぽんず
  think();
  if(dog.state==='nose_sniff'){
    dog.sniffT -= dt;
    if(Math.random()<dt*3) particle('funfun','ふんふん', dog.x, dog.y-8, 3);
    if(dog.sniffT<=0){
      earn(CONFIG.NOSEWORK_POINTS, POS.MAT.x, POS.MAT.y-8, true);
      state.stats.nose++;
      clearScent(); noseQueued=false;
      nextScentAt = performance.now() + rand(CONFIG.NOSEWORK_MIN_MS, CONFIG.NOSEWORK_MAX_MS);
      particle('heart','🎉', POS.MAT.x, POS.MAT.y-4, 2);
      dog.state='idle'; dog.idleWait=rand(0.3,1);
    }
  } else if(dog.state!=='idle'){
    let spd = dogSpeed();
    if(dog.state==='fetch') spd *= CONFIG.DASH_MULT;
    if(dog.state==='haul_carry') spd *= CONFIG.HAUL_MULT;
    const d = dist(dog.x,dog.y,dog.tx,dog.ty);
    if(d < 2){ dog.x=dog.tx; dog.y=dog.ty; arrive(); }
    else{
      const step = spd*dt;
      dog.x += (dog.tx-dog.x)/d*step;
      dog.y += (dog.ty-dog.y)/d*step;
      if(Math.abs(dog.tx-dog.x)>0.5) dogEl.classList.toggle('faceLeft', dog.tx<dog.x);
    }
  }

  // 描画
  dogEl.style.left = dog.x+'%'; dogEl.style.top = dog.y+'%';
  dogEl.classList.toggle('moving', dog.state!=='idle' && dog.state!=='nose_sniff');
  dogEl.classList.toggle('dashing', dog.state==='fetch');
  dogEl.classList.toggle('sniffing', dog.state==='nose_sniff');
  if(bigItem && bigItem.attached){
    const back = dogEl.classList.contains('faceLeft') ? 7 : -7;
    const wx = dog.x + back, wy = dog.y + 2;
    const w = $('wagonEl'), bi = $('bigItemEl');
    w.style.left=wx+'%'; w.style.top=wy+'%';
    bi.style.left=wx+'%'; bi.style.top=(wy-4)+'%';
    bi.style.fontSize='34px';
  }

  requestAnimationFrame(loop);
}

/* =====================================================
   入力
   ===================================================== */
function gardenPos(ev){
  const r = garden.getBoundingClientRect();
  return { x:(ev.clientX-r.left)/r.width*100, y:(ev.clientY-r.top)/r.height*100 };
}

dogEl.addEventListener('pointerdown', ev=>{
  ev.stopPropagation();
  const now = Date.now();
  petTimes = petTimes.filter(t=> now-t < CONFIG.PET_WINDOW_MS);
  petTimes.push(now);
  particle('heart','💗', dog.x, dog.y-10, 4);
  state.stats.pets++;
  if(petTimes.length <= CONFIG.PET_LIMIT){
    earn(CONFIG.PET_POINTS, dog.x, dog.y-16, false);
  }
});

$('scentEl').addEventListener('pointerdown', ev=>{
  ev.stopPropagation();
  if(!scentActive || noseQueued) return;
  noseQueued = true;
  toast('ぽんず、においを探しに行くよ！');
});

garden.addEventListener('pointerdown', ev=>{
  if(ev.target.closest('#endingOverlay')) return;
  const now = performance.now();
  if(thrownBall || now < throwReadyAt) return;
  if(dog.state==='nose_sniff') return;
  const p = gardenPos(ev);
  if(p.y < 6 || dist(p.x,p.y,POS.BOX.x,POS.BOX.y)<8) return;
  // ボールを投げる（画面下から放物線）
  thrownBall = { sx:50, sy:96, tx:p.x, ty:p.y, t:0, landed:false };
  const el = $('ballEl');
  el.style.display='block'; el.style.left='50%'; el.style.top='96%';
  state.stats.thrown++;
  throwReadyAt = now + CONFIG.THROW_COOLDOWN_MS;
});
/* =====================================================
   ショップ
   ===================================================== */
function renderShop(){
  const panel = $('shopPanel');
  panel.innerHTML = '';
  for(const item of CONFIG.SHOP){
    const row = document.createElement('div');
    row.className = 'shopItem';
    row.id = 'shop_'+item.id;
    row.innerHTML =
      '<div class="icon">'+item.emoji+'</div>'+
      '<div class="info"><div class="name">'+item.name+'</div><div class="desc">'+item.desc+'</div></div>'+
      '<button class="buyBtn" data-id="'+item.id+'"></button>';
    panel.appendChild(row);
  }
  panel.addEventListener('click', ev=>{
    const btn = ev.target.closest('.buyBtn');
    if(btn) buy(btn.dataset.id);
  });
  renderShopStates();
}

function renderShopStates(){
  for(const item of CONFIG.SHOP){
    const row = $('shop_'+item.id);
    if(!row) continue;
    const btn = row.querySelector('.buyBtn');
    if(own(item.id)){
      row.classList.add('owned');
      btn.textContent = '✓ ゲット';
      btn.disabled = true;
    }else{
      btn.textContent = fmt(item.price)+'pt';
      btn.disabled = state.points < item.price;
    }
  }
}

function buy(id){
  const item = CONFIG.SHOP.find(i=>i.id===id);
  if(!item || own(id) || state.points < item.price) return;
  state.points -= item.price;
  state.owned[id] = true;
  applyPurchase(id);
  updateHUD();
  renderShopStates();
  const row = $('shop_'+id);
  row.classList.add('justBought');
  toast(item.emoji+' '+item.name+' を庭にお迎え！');
  save();
  checkEnding();
}

function applyPurchase(id){
  switch(id){
    case 'toybox1': $('toybox').classList.add('up1'); break;
    case 'toybox2': $('toybox').classList.add('up2'); break;
    case 'mat':
      $('matEl').style.display='block';
      nextScentAt = performance.now() + 8000; // 購入直後は早めに1回出す
      break;
    case 'wagon':
      nextBigAt = performance.now() + 10000;
      break;
    case 'flowers':
      document.querySelectorAll('.flower').forEach(el=>el.style.display='block');
      break;
    case 'bench': $('benchEl').style.display='block'; break;
    case 'doghouse': $('doghouseEl').style.display='block'; break;
  }
}
function applyAllPurchases(){
  for(const id of Object.keys(state.owned)) if(state.owned[id]) applyPurchase(id);
}

/* ===== エンディング ===== */
function checkEnding(){
  if(state.endingSeen) return;
  if(!CONFIG.SHOP.every(i=>own(i.id))) return;
  state.endingSeen = true;
  save();
  $('endingOverlay').classList.add('show');
  confetti();
}
function confetti(){
  const emojis = ['🎉','🌸','💗','🦴','🎾','✨'];
  for(let i=0;i<70;i++){
    const el = document.createElement('div');
    el.className='confetti';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'%';
    el.style.animationDuration = rand(2.4,4.6)+'s';
    el.style.animationDelay = rand(0,1.4)+'s';
    document.getElementById('app').appendChild(el);
    setTimeout(()=>el.remove(), 6500);
  }
}
$('endingClose').addEventListener('click', ()=>{
  $('endingOverlay').classList.remove('show');
  toast('これからも ぽんずと いっしょ🐾');
});

/* ===== きろく ===== */
function renderStats(){
  const s = state.stats;
  const days = Math.max(1, Math.ceil((Date.now()-state.started)/86400000));
  const rows = [
    ['ためた喜びポイント（累計）', fmt(s.earned)+'pt'],
    ['おもちゃの納品', fmt(s.delivered)+'回'],
    ['ボール投げ', fmt(s.thrown)+'回'],
    ['なでなで', fmt(s.pets)+'回'],
    ['ノーズワーク成功', fmt(s.nose)+'回'],
    ['大きいもの運び', fmt(s.hauls)+'回'],
    ['庭であそんだ日数', days+'日目'],
  ];
  $('statsPanel').innerHTML = rows.map(r=>'<div class="statRow"><span>'+r[0]+'</span><b>'+r[1]+'</b></div>').join('');
}

/* ===== タブ・シート ===== */
const sheet = $('sheet');
$('sheetHandle').addEventListener('click', ()=> sheet.classList.toggle('open'));
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    $(tab.dataset.panel).classList.add('active');
    if(tab.dataset.panel==='statsPanel') renderStats();
    sheet.classList.add('open');
  });
});

/* ===== おうえん ===== */
$('supportBtn').addEventListener('click', ()=>{
  if(SUPPORT_LINK_URL){
    window.open(SUPPORT_LINK_URL, '_blank', 'noopener');
  }else{
    toast('おやつリンクは準備中だよ🦴 もうちょっとまってね');
  }
});

/* ===== おるすばん収入（ドッグハウス） ===== */
function offlineReward(){
  if(!own('doghouse')) return;
  const mins = (Date.now() - state.lastSeen) / 60000;
  if(mins < 1) return;
  const pts = Math.min(Math.floor(mins * CONFIG.OFFLINE_PT_PER_MIN), CONFIG.OFFLINE_CAP_PT);
  if(pts <= 0) return;
  state.points += pts;
  state.stats.earned += pts;
  toast('🏠 おるすばん中に '+fmt(pts)+'pt たまってたよ');
}

/* ===== 起動 ===== */
function init(){
  load();
  offlineReward();
  applyAllPurchases();
  renderShop();
  updateHUD();
  if(own('mat'))   nextScentAt = performance.now() + rand(10000, 25000);
  if(own('wagon')) nextBigAt   = performance.now() + rand(15000, 40000);
  spawnToy(); spawnToy();
  nextSpawnAt = performance.now() + CONFIG.SPAWN_INTERVAL_MS;
  requestAnimationFrame(t=>{ lastT=t; requestAnimationFrame(loop); });
  setInterval(save, 5000);
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden) save(); });
  window.addEventListener('pagehide', save);
}
init();

/* ===== PWA ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
