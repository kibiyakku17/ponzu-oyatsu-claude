<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7FA889">
<title>ぽんず（本物）のおやつ代ゲーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1EA;
  --panel:#fff;
  --ink:#30322D;
  --muted:#888B7E;
  --line:#E0DDD2;
  --soft:#F7F6EF;
  --sage:#7FA889;   --sage-s:#E4EFE3;
  --coral:#EFA888;  --coral-s:#FBE9E0;
  --amber:#E5B65C;  --amber-s:#FBF1DC;
  --shadow:0 4px 18px rgba(48,50,45,.08);
  --shadow-sm:0 2px 8px rgba(48,50,45,.05);
}
*{ box-sizing:border-box; }
body{
  margin:0; min-height:100vh;
  background:linear-gradient(165deg,#F5F7F0 0%,var(--bg) 60%,#E8EDE4 100%);
  color:var(--ink);
  font-family:'Zen Maru Gothic',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{ max-width:480px; margin:0 auto; padding:18px 16px calc(32px + env(safe-area-inset-bottom)); }

/* ── header ── */
.header{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
.header h1{ font-size:18px; margin:0; font-weight:900; }
.header p{ margin:2px 0 0; font-size:11px; color:var(--muted); }
.points-pill{
  background:var(--sage); color:#fff; font-weight:900; font-size:15px;
  padding:8px 16px; border-radius:999px; box-shadow:var(--shadow-sm);
  display:flex; align-items:center; gap:5px; white-space:nowrap;
}

/* ── card base ── */
.card{
  background:var(--panel); border-radius:16px; padding:16px;
  box-shadow:var(--shadow); margin-bottom:16px;
}
.card h2{ font-size:14px; margin:0 0 10px; color:var(--muted); font-weight:700; letter-spacing:.03em; }

/* ── facility ── */
.facility-visual{ text-align:center; padding:10px 0 6px; }
.facility-emoji{ font-size:56px; line-height:1; }
.facility-name{ font-weight:900; font-size:17px; margin:8px 0 2px; }
.facility-message{ font-size:12px; color:var(--muted); margin:0 0 12px; min-height:1.4em; }
.facility-progress-wrap{ margin:0 0 12px; }
.facility-progress-label{ display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.facility-progress{ height:10px; background:var(--soft); border-radius:6px; overflow:hidden; border:1px solid var(--line); }
.facility-progress i{ display:block; height:100%; background:var(--amber); transition:width .25s; }
.upgrade-btn{
  width:100%; padding:13px; border:none; border-radius:12px;
  background:var(--amber); color:#5a4200; font-weight:900; font-size:14px;
  font-family:inherit; cursor:pointer;
}
.upgrade-btn:disabled{ background:var(--soft); color:var(--muted); }
.upgrade-btn.maxed{ background:var(--sage-s); color:var(--sage); }

/* ── skills ── */
.skill-list{ display:flex; flex-direction:column; gap:10px; }
.skill-item{
  display:flex; align-items:center; gap:12px;
  background:var(--soft); border-radius:12px; padding:10px 12px;
}
.skill-emoji{ font-size:26px; width:38px; text-align:center; flex:none; }
.skill-info{ flex:1; min-width:0; }
.skill-name{ font-weight:900; font-size:14px; }
.skill-desc{ font-size:10.5px; color:var(--muted); margin-top:1px; line-height:1.35; }
.skill-stat{ font-size:10.5px; color:var(--sage); margin-top:2px; font-weight:700; }
.done-btn{
  flex:none; border:none; border-radius:10px; padding:10px 14px;
  background:var(--sage); color:#fff; font-weight:900; font-size:12.5px;
  font-family:inherit; cursor:pointer; white-space:nowrap;
}
.done-btn:active{ background:#6c9678; }

/* ── toast ── */
#toast{
  position:fixed; top:calc(env(safe-area-inset-top,0) + 16px); left:50%; transform:translateX(-50%);
  background:rgba(48,50,45,.92); color:#fff; padding:10px 18px; border-radius:10px;
  font-size:13px; font-weight:700; z-index:50; display:none; max-width:86vw; text-align:center;
  box-shadow:var(--shadow);
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>🐾 ぽんず（本物）のおやつ代</h1>
      <p>できることが増えるたび、うれしいが貯まるよ</p>
    </div>
    <div class="points-pill">💛 <span id="pointsVal">0</span>pt</div>
  </div>

  <div class="card">
    <h2>ぽんずの庭</h2>
    <div class="facility-visual">
      <div class="facility-emoji" id="facilityEmoji">🌱</div>
      <div class="facility-name" id="facilityName">はじまりの原っぱ</div>
      <p class="facility-message" id="facilityMessage"></p>
    </div>
    <div class="facility-progress-wrap" id="facilityProgressWrap">
      <div class="facility-progress-label">
        <span>次の段階まで</span>
        <span id="facilityProgressLabel">0 / 0 pt</span>
      </div>
      <div class="facility-progress"><i id="facilityProgressBar" style="width:0%"></i></div>
    </div>
    <button class="upgrade-btn" id="upgradeBtn">強化する</button>
  </div>

  <div class="card">
    <h2>できることリスト</h2>
    <div class="skill-list" id="skillList"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// 調整パラメータ（数値はすべてここにまとめる）
// ═══════════════════════════════════════════════
const CONFIG = {
  POINTS_PER_ACHIEVEMENT: 10,  // 「今日できた」1回あたりに加算する喜びポイント
  // 施設強化の段階。costはその段階へ上がるのに必要な喜びポイント（0段階目=初期状態はcost不要）
  UPGRADE_LEVELS: [
    { name: 'はじまりの原っぱ', emoji: '🌱', message: 'ここからぽんずの庭づくりが始まるよ', cost: 0 },
    { name: '小さなお家',       emoji: '🏠', message: 'ぽんずのおうちができた！', cost: 50 },
    { name: 'お花畑',           emoji: '🌸', message: 'お花が咲いて庭が華やかになった！', cost: 100 },
    { name: 'ベンチと木陰',     emoji: '🌳', message: 'のんびりできるベンチが登場！', cost: 150 },
    { name: 'お祝い広場',       emoji: '🎉', message: '盛大にお祝いできる特別な庭になった！', cost: 200 },
  ],
};

// ═══════════════════════════════════════════════
// できることリスト（固定7種・段階解放なし）
// ═══════════════════════════════════════════════
const SKILLS = [
  { id: 'ote',   name: 'お手',    icon: '🐾' },
  { id: 'fuse',  name: '伏せ',    icon: '🐕' },
  { id: 'mate',  name: 'まて',    icon: '✋' },
  { id: 'hana',  name: '鼻',      icon: '👌', desc: '手をOKサインの形にして、その穴に鼻を突っ込む' },
  { id: 'ago',   name: 'あご',    icon: '🤏', desc: '手をチェックサインの形にして、親指と人差し指の間に顎を乗せる' },
  { id: 'chu',   name: 'ちゅ！',  icon: '💐', desc: '飼い主にお花チューをしてくれる' },
  { id: 'touch', name: 'タッチ！', icon: '🙌', desc: '少し高めに掲げた手に、立ち上がってタッチする' },
];

// ═══════════════════════════════════════════════
// セーブ
// ═══════════════════════════════════════════════
const SAVE_KEY = 'ponzu_oyatsu_v1';
let state = {
  points: 0,      // 現在の喜びポイント（施設強化で消費される）
  level: 0,       // 施設強化の現在段階（UPGRADE_LEVELSのindex）
  skills: {},     // id -> { count, lastAt }
};
function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    state.points = d.points || 0;
    state.level = d.level || 0;
    state.skills = d.skills || {};
  } catch (e) { /* 壊れたセーブは無視して初期状態から始める */ }
}
function saveState() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) { /* 容量オーバー等は無視 */ }
}

// ═══════════════════════════════════════════════
// 施設強化
// ═══════════════════════════════════════════════
function currentLevelDef() { return CONFIG.UPGRADE_LEVELS[state.level]; }
function nextLevelDef() { return CONFIG.UPGRADE_LEVELS[state.level + 1] || null; }
function upgradeFacility() {
  const next = nextLevelDef();
  if (!next || state.points < next.cost) return;
  state.points -= next.cost;
  state.level++;
  saveState();
  renderAll();
  toast(`🎉 ${next.name}に強化した！`);
}

// ═══════════════════════════════════════════════
// できることリスト：達成記録
// ═══════════════════════════════════════════════
function markDone(id) {
  state.points += CONFIG.POINTS_PER_ACHIEVEMENT;
  const s = state.skills[id] || (state.skills[id] = { count: 0, lastAt: null });
  s.count++;
  s.lastAt = Date.now();
  saveState();
  renderAll();
  const skill = SKILLS.find(x => x.id === id);
  toast(`💛 ${skill.name}できた！ +${CONFIG.POINTS_PER_ACHIEVEMENT}pt`);
}
function relativeTime(ts) {
  if (!ts) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const target = new Date(ts); target.setHours(0, 0, 0, 0);
  const dayDiff = Math.round((today - target) / 86400000);
  if (dayDiff <= 0) return '今日';
  if (dayDiff === 1) return '昨日';
  return `${dayDiff}日前`;
}

// ═══════════════════════════════════════════════
// トースト
// ═══════════════════════════════════════════════
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2200);
}

// ═══════════════════════════════════════════════
// 描画
// ═══════════════════════════════════════════════
function renderHeader() {
  document.getElementById('pointsVal').textContent = state.points;
}
function renderFacility() {
  const cur = currentLevelDef();
  const next = nextLevelDef();
  document.getElementById('facilityEmoji').textContent = cur.emoji;
  document.getElementById('facilityName').textContent = cur.name;
  document.getElementById('facilityMessage').textContent = cur.message;

  const progressWrap = document.getElementById('facilityProgressWrap');
  const btn = document.getElementById('upgradeBtn');
  if (next) {
    progressWrap.style.display = 'block';
    const pct = Math.min(100, Math.round(state.points / next.cost * 100));
    document.getElementById('facilityProgressBar').style.width = pct + '%';
    document.getElementById('facilityProgressLabel').textContent = `${Math.min(state.points, next.cost)} / ${next.cost} pt`;
    const ok = state.points >= next.cost;
    btn.textContent = ok ? `⬆️ ${next.name}に強化する（${next.cost}pt）` : `⬆️ ${next.name}まであと${next.cost - state.points}pt`;
    btn.disabled = !ok;
    btn.classList.remove('maxed');
  } else {
    progressWrap.style.display = 'none';
    btn.textContent = '🎉 さいこう段階まで強化ずみ！';
    btn.disabled = true;
    btn.classList.add('maxed');
  }
}
function renderSkills() {
  const el = document.getElementById('skillList');
  el.innerHTML = SKILLS.map(s => {
    const stat = state.skills[s.id];
    const count = stat ? stat.count : 0;
    const rel = stat ? relativeTime(stat.lastAt) : null;
    return `<div class="skill-item">
      <div class="skill-emoji">${s.icon}</div>
      <div class="skill-info">
        <div class="skill-name">${s.name}</div>
        ${s.desc ? `<div class="skill-desc">${s.desc}</div>` : ''}
        <div class="skill-stat">${count > 0 ? `これまで${count}回できた${rel ? '・最後は' + rel : ''}` : 'まだ記録なし'}</div>
      </div>
      <button class="done-btn" data-skill="${s.id}">今日できた！</button>
    </div>`;
  }).join('');
  el.querySelectorAll('[data-skill]').forEach(btn => {
    btn.onclick = () => markDone(btn.dataset.skill);
  });
}
function renderAll() {
  renderHeader();
  renderFacility();
  renderSkills();
}

document.getElementById('upgradeBtn').onclick = upgradeFacility;

// ═══════════════════════════════════════════════
// 起動
// ═══════════════════════════════════════════════
loadState();
renderAll();
</script>
</body>
</html>
